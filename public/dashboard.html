<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Class Dashboard - Client A</title>
    <link rel="stylesheet" href="css/theme.css">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        .hidden { display: none; }
        /* ?國盒 ?�� ?𨰰� ??*/
        .connection-indicator {
            position: fixed;
            bottom: 12px;
            right: 12px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #555;
            border: 2px solid rgba(212, 175, 55, 0.4);
            z-index: 9999;
            transition: background 0.3s;
        }
        .connection-indicator.connected { background: #22c55e; }
        .connection-indicator.disconnected { background: #8b0000; }
        /* 공지사항 긴급 알림 */
        .alert-banner {
            background: rgba(139, 0, 0, 0.9);
            border: 1px solid #8b0000;
            color: #f0e6d2;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.7em; /* Relative to the header's 1.5em */
            text-align: center;
            width: fit-content;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            margin: 0;
            animation: pulse 2s infinite;
        }
        /* Result Reveal Cards */
        .result-card {
            background: var(--panel-bg);
            border: 2px solid var(--primary-color);
            border-radius: 12px;
            padding: 20px 30px;
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.5em;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        .result-card.visible { opacity: 1; transform: translateY(0); }
        .result-card.winner {
            border-color: #ffd700;
            box-shadow: 0 0 30px rgba(255,215,0,0.5);
            font-size: 1.8em;
        }
    </style>
</head>
<body>
    <div class="overlay">
        <div class="panel" style="display: flex; justify-content: space-between; align-items: center; padding: 10px 20px;">
            <div style="flex: 1.5; text-align: left; display: flex; align-items: center; gap: 15px;">
                <h1 id="classTitle" style="margin-bottom:0; white-space:nowrap;">Class Dashboard</h1>
                <button id="btnStatusBoards" class="btn-ready" onclick="toggleStatusBoards()" style="background:var(--panel-bg); color:var(--text-main); border-color:var(--border-color); font-size:0.7em; padding:8px 12px; white-space:nowrap;">Status Boards</button>
            </div>
            <div style="flex: 1; text-align: center;"><div class="timer" id="timerDisplay" style="font-size:2.5em; display:inline-block;">00:00</div></div>
            <div style="flex: 1.5; font-size: 1.5em; display: flex; align-items: center; justify-content: flex-end; gap: 15px; position: relative;">
                <div id="alertBanner" class="alert-banner" style="display:none; position: absolute; left: 0; top: 50%; transform: translateY(-50%); z-index: 100;"></div>
                <button id="btnReadyToggle" class="btn-ready" onclick="toggleReady()">Ready</button>
                <div style="text-align: right;">
                    <div class="status-header">Round: <span id="lblRound" style="color:var(--primary-color);">?</span></div>
                    <div class="status-header">Phase: <span id="lblPhase" style="color:var(--primary-color);">?</span></div>
                </div>
            </div>
        </div>

        <div class="grid flex-1" style="gap: 10px; grid-template-columns: 1fr 2fr; min-height: 0;">
            <!-- Left Column: Inventory, Roles, Past Restorations -->
            <div class="flex-col" style="gap: 10px; min-height: 0;">
                <div class="panel flex-col" style="padding: 10px; justify-content: space-evenly; flex: 0 0 auto;">
                    <h2 style="font-size: 1.2em; margin-bottom: 10px;">Fossil Inventory</h2>
                    <div class="grid grid-cols-4" id="inventory" style="text-align:center; align-items:center;">
                        <div style="padding: 10px;"><span style="font-size: 2.5em; display:block; margin-bottom:10px;"><img src="resources/skull.png" style="height:1em; vertical-align:middle;"></span><span style="font-size:1.2em; color:var(--text-muted);">Skull</span><br><strong id="invH" style="font-size: 2em; color:var(--primary-color);">0</strong></div>
                        <div style="padding: 10px;"><span style="font-size: 2.5em; display:block; margin-bottom:10px;"><img src="resources/torso.png" style="height:1em; vertical-align:middle;"></span><span style="font-size:1.2em; color:var(--text-muted);">Torso</span><br><strong id="invB" style="font-size: 2em; color:var(--primary-color);">0</strong></div>
                        <div style="padding: 10px;"><span style="font-size: 2.5em; display:block; margin-bottom:10px;"><img src="resources/leg.png" style="height:1em; vertical-align:middle;"></span><span style="font-size:1.2em; color:var(--text-muted);">Leg</span><br><strong id="invL" style="font-size: 2em; color:var(--primary-color);">0</strong></div>
                        <div style="padding: 10px;"><span style="font-size: 2.5em; display:block; margin-bottom:10px;"><img src="resources/tail.png" style="height:1em; vertical-align:middle;"></span><span style="font-size:1.2em; color:var(--text-muted);">Tail</span><br><strong id="invT" style="font-size: 2em; color:var(--primary-color);">0</strong></div>
                    </div>
                </div>
                
                <div class="panel flex-col" style="padding: 10px; justify-content: center; flex: 0 0 auto;">
                    <h2 style="font-size: 1.1em; margin-bottom: 5px;">Group Roles (Round <span id="lblRoleRound">1</span>)</h2>
                    <div id="roleTable" class="grid grid-cols-2" style="text-align:center; font-size:1em; font-weight:bold; color:var(--text-main); margin-top:5px; gap: 8px;"></div>
                </div>

                <div class="panel flex-col flex-1" style="padding: 10px; margin: 0; min-height: 0;">
                    <h2 style="font-size: 1.1em;">Past Restorations</h2>
                    <div class="scrollable-panel flex-1">
                        <table id="tblPastRestorations" style="width:100%; text-align:center; font-size:0.9em;">
                            <tr>
                                <th style="width:20%;">Round</th>
                                <th style="width:12%;">Rank</th>
                                <th style="width:11%;"><img src="resources/skull.png" style="height:1.2em; vertical-align:middle;" title="Skull"></th>
                                <th style="width:11%;"><img src="resources/torso.png" style="height:1.2em; vertical-align:middle;" title="Torso"></th>
                                <th style="width:11%;"><img src="resources/leg.png" style="height:1.2em; vertical-align:middle;" title="Leg"></th>
                                <th style="width:11%;"><img src="resources/tail.png" style="height:1.2em; vertical-align:middle;" title="Tail"></th>
                                <th style="width:24%;">Error Rate</th>
                            </tr>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Right Column: Hints -->
            <div class="panel flex-col flex-1" style="padding: 10px; min-height: 0;">
                <h2 style="font-size: 1.1em;">Unlocked Hints</h2>
                <div id="hintsList" class="scrollable-panel flex-1" style="font-size: 1em; padding-right:10px;"></div>
                
                <div id="pnlSubmitFossil" class="hidden" style="margin-top:10px; border-top:1px solid var(--border-color); padding-top:10px; flex-shrink: 0;">
                    <h2 style="font-size: 1.1em; color:var(--primary-color); margin-bottom:10px;">Submit Fossil Restoration</h2>
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px; gap:10px;">
                        <div style="flex:1; text-align:center;">
                            <img src="resources/skull.png" style="height:1.2em; vertical-align:middle; margin-right:5px;"> Skull<br>
                            <input type="number" id="subH" value="0" min="0" style="width:100%; text-align:center; margin-top:5px;">
                        </div>
                        <div style="flex:1; text-align:center;">
                            <img src="resources/torso.png" style="height:1.2em; vertical-align:middle; margin-right:5px;"> Torso<br>
                            <input type="number" id="subB" value="0" min="0" style="width:100%; text-align:center; margin-top:5px;">
                        </div>
                        <div style="flex:1; text-align:center;">
                            <img src="resources/leg.png" style="height:1.2em; vertical-align:middle; margin-right:5px;"> Leg<br>
                            <input type="number" id="subL" value="0" min="0" style="width:100%; text-align:center; margin-top:5px;">
                        </div>
                        <div style="flex:1; text-align:center;">
                            <img src="resources/tail.png" style="height:1.2em; vertical-align:middle; margin-right:5px;"> Tail<br>
                            <input type="number" id="subT" value="0" min="0" style="width:100%; text-align:center; margin-top:5px;">
                        </div>
                    </div>
                    <button id="btnSubmitFossil" onclick="submitFossil()" style="width:100%;">Submit Fossil Restoration</button>
                    <div id="lblLockStatus" style="color: var(--accent-red); text-align: center; margin-top: 10px; display: none; font-weight: bold;"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Status Boards Modal (outside .overlay to avoid overflow:hidden clipping) -->
    <div id="statusBoardsOverlay" style="opacity:0; transition: opacity 0.3s ease; display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(10,8,5,0.95); z-index:8000; flex-direction:column; justify-content:center; align-items:center;">
        <div class="panel flex-col" style="width:90%; max-width:1200px; height:80%; max-height:800px; padding:20px; position:relative;">
            <button onclick="toggleStatusBoards()" style="position:absolute; top:10px; right:10px; background:var(--accent-red); color:white; border:none; padding:8px 16px; cursor:pointer; font-weight:bold; border-radius:4px;">Close</button>
            <div class="grid flex-1" style="gap:20px; min-height:0; margin-top:20px; grid-template-columns: 3fr 5fr;">
                <div class="flex-col flex-1" style="min-height:0;">
                    <h2 style="font-size: 1.2em; margin-bottom: 10px; color:var(--primary-color);">Excavator Distributions</h2>
                    <div id="excavatorSacks" class="scrollable-panel flex-1" style="font-size: 1em;">Waiting...</div>
                </div>
                <div class="flex-col flex-1" style="min-height:0;">
                    <h2 style="font-size: 1.2em; margin-bottom: 10px; color:var(--primary-color);">Global Treasure Hunt Board</h2>
                    <div class="scrollable-panel flex-1">
                        <table id="globalBoard" style="font-size:1em; width:100%;">
                            <!-- Headers dynamically injected -->
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="connectionDot" class="connection-indicator"></div>

    <!-- Result Reveal Overlay (outside .overlay to avoid overflow:hidden clipping) -->
    <div id="resultOverlay" style="opacity:0; transition: opacity 0.8s ease; display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(10,8,5,0.95); z-index:9000; flex-direction:column; justify-content:center; align-items:center;">
        <h1 style="font-size:2.5em; margin-bottom:30px;">Round Results</h1>
        <div id="resultCards" style="width:80%; max-width:800px; text-align:left;"></div>
    </div>

    <script src="js/socket-client.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let myClassId = urlParams.get('class_id');
        if (!myClassId) {
            myClassId = prompt("Enter your Class ID (e.g. 27, 28, 29, 30, 31):");
            window.location.search = `?class_id=${myClassId}`;
        }
        document.getElementById('classTitle').innerText = `Class ${myClassId} Dashboard`;

        let currentRound = 1; // Tracks current round, updated on every state update
        window.classHints = {};
        window.boneMap = {};

        socket.on('hints:data', (hints) => {
            window.classHints = hints;
            if (window.gameState) {
                window.onStateUpdate(window.gameState);
            }
        });

        socket.on('boneMap:data', (map) => {
            window.boneMap = map;
            if (window.gameState) {
                window.onStateUpdate(window.gameState);
            }
        });

        socket.on('connect', () => {
            socket.emit('getHints', myClassId);
            socket.emit('getBoneMap');
            socket.emit('getReadyStatus');
            document.getElementById('connectionDot').classList.add('connected');
            document.getElementById('connectionDot').classList.remove('disconnected');
        });

        socket.on('disconnect', () => {
            document.getElementById('connectionDot').classList.remove('connected');
            document.getElementById('connectionDot').classList.add('disconnected');
        });

        socket.on('admin:alertMessage', (msg) => {
            const banner = document.getElementById('alertBanner');
            banner.textContent = msg;
            banner.style.display = 'block';
        });

        socket.on('admin:closeAlert', () => {
            const banner = document.getElementById('alertBanner');
            banner.style.display = 'none';
            banner.textContent = '';
        });

        const phaseNames = {1:'Plan', 2:'Mission', 3:'Return', 4:'Restoration', 5:'Submission'};

        function onStateUpdate(state) {
            currentRound = state.current_round;
            document.getElementById('lblRound').innerText = state.current_round;
            document.getElementById('lblRoleRound').innerText = state.current_round;
            document.getElementById('lblPhase').innerText = `${state.current_phase} (${phaseNames[state.current_phase] || ''})`;

            if(state.classes) {
                const myClass = state.classes.find(c => c.class_id == myClassId);
                if(myClass) {
                    document.getElementById('invH').innerText = myClass.skull_count;
                    document.getElementById('invB').innerText = myClass.torso_count;
                    document.getElementById('invL').innerText = myClass.leg_count;
                    document.getElementById('invT').innerText = myClass.tail_count;
                }
            }

            if(state.cards) {
                let html = '<colgroup><col style="width: 15%;"><col style="width: 15%;"><col style="width: 15%;"><col style="width: 15%;"><col style="width: 40%;"></colgroup><tr><th>Class</th><th>Card ID</th><th>Type</th><th>Status</th><th>Contents</th></tr>';
                let hintsHtml = '';
                let usedTickets = JSON.parse(localStorage.getItem('usedTickets') || '{}');
                let hintsByRound = {};
                
                const classGroups = { 27: [], 28: [], 29: [], 30: [], 31: [] };
                let sortedCards = sortCards([...state.cards]);
                sortedCards.forEach(c => {
                    if (c.round == state.current_round) {
                        if (classGroups[c.owner_class_id]) classGroups[c.owner_class_id].push(c);
                    }
                    
                    if(c.status === 'RELEASED' && c.owner_class_id == myClassId && c.type === 'HINT') {
                        if (!hintsByRound[c.round]) hintsByRound[c.round] = [];
                        hintsByRound[c.round].push(c);
                    }
                });

                Object.keys(hintsByRound).sort((a,b) => parseInt(a) - parseInt(b)).forEach(rnd => {
                    hintsHtml += `<h3 style="color:var(--primary-color); margin-top:15px; margin-bottom:5px; border-bottom:1px solid var(--border-color); padding-bottom:5px;">Round ${rnd}</h3>`;
                    hintsByRound[rnd].forEach(c => {
                        const hintText = (window.classHints && window.classHints[c.card_id])
                            ? window.classHints[c.card_id] : `Unknown Hint: ${c.card_id}`;
                        const formattedHint = hintText.replace(/\b(skull|torso|leg|tail)\b/gi, match => {
                            const word = match.charAt(0).toUpperCase() + match.slice(1).toLowerCase();
                            return `<strong>${word}</strong>`;
                        });
                        
                        const isTicket = hintText.includes('감정권');
                        if (isTicket) {
                            const isUsed = usedTickets[c.card_id];
                            const styleStr = isUsed ? "text-decoration:line-through; opacity:0.5;" : "text-decoration:none; opacity:1;";
                            hintsHtml += `<div class="hint-text" style="cursor:pointer; border: 1px solid var(--primary-color); background:rgba(139, 69, 19, 0.1); padding:8px; border-radius:4px; margin-top:5px; transition:all 0.3s ease; ${styleStr}" onclick="toggleTicket(this, '${c.card_id}')" title="Click to toggle used status">
                                <span style="color:var(--primary-color); margin-right:8px; font-weight:bold; flex-shrink:0; align-self:center;">[TICKET]</span>
                                <div>${formattedHint}</div>
                            </div>`;
                        } else {
                            hintsHtml += `<div class="hint-text">
                                <span style="color:var(--primary-color); margin-right:8px; font-weight:bold; flex-shrink:0;">[HINT]</span>
                                <div>${formattedHint}</div>
                            </div>`;
                        }
                    });
                });

                Object.keys(classGroups).sort((a,b) => parseInt(a) - parseInt(b)).forEach(clsId => {
                    const cards = classGroups[clsId];
                    if (cards.length === 0) {
                        html += `<tr><td style="vertical-align:middle; font-weight:bold; border-bottom: 2px solid var(--primary-color);">Class ${clsId}</td><td style="color:var(--text-muted); border-bottom: 2px solid var(--primary-color);">-</td><td style="color:var(--text-muted); border-bottom: 2px solid var(--primary-color);">-</td><td style="color:var(--text-muted); border-bottom: 2px solid var(--primary-color);">-</td><td style="color:var(--text-muted); border-bottom: 2px solid var(--primary-color);">-</td></tr>`;
                    } else {
                        cards.forEach((card, idx) => {
                            let contents = '-';
                            if (card.type === 'BONE' && window.boneMap && window.boneMap[card.card_id]) {
                                const bones = window.boneMap[card.card_id];
                                contents = `<img src="resources/skull.png" style="height:1.2em; vertical-align:middle;" title="Skull"> ${bones.skull} &nbsp; ` +
                                    `<img src="resources/torso.png" style="height:1.2em; vertical-align:middle;" title="Torso"> ${bones.torso} &nbsp; ` +
                                    `<img src="resources/leg.png" style="height:1.2em; vertical-align:middle;" title="Leg"> ${bones.leg} &nbsp; ` +
                                    `<img src="resources/tail.png" style="height:1.2em; vertical-align:middle;" title="Tail"> ${bones.tail}`;
                            }

                            const isLast = (idx === cards.length - 1);
                            const btmBorder = isLast ? ' border-bottom: 2px solid var(--primary-color);' : '';
                            html += `<tr>
                                ${idx === 0 ? `<td rowspan="${cards.length}" style="vertical-align:middle; font-weight:bold; border-bottom: 2px solid var(--primary-color);">Class ${clsId}</td>` : ''}
                                <td style="font-weight:bold;${btmBorder}">${card.card_id}</td>
                                <td style="${btmBorder}">${card.type}</td>
                                <td style="${btmBorder}">${(card.status === 'PENDING' && card.is_locked === 1) ? 'LOCKED' : card.status}</td>
                                <td style="${btmBorder}">${contents}</td>
                            </tr>`;
                        });
                    }
                });
                
                document.getElementById('globalBoard').innerHTML = html;
                document.getElementById('hintsList').innerHTML = hintsHtml;
            }

            if (state.restorations) {
                let restHtml = `<tr>
                                <th style="width:20%;">Round</th>
                                <th style="width:12%;">Rank</th>
                                <th style="width:11%;"><img src="resources/skull.png" style="height:1.2em; vertical-align:middle;" title="Skull"></th>
                                <th style="width:11%;"><img src="resources/torso.png" style="height:1.2em; vertical-align:middle;" title="Torso"></th>
                                <th style="width:11%;"><img src="resources/leg.png" style="height:1.2em; vertical-align:middle;" title="Leg"></th>
                                <th style="width:11%;"><img src="resources/tail.png" style="height:1.2em; vertical-align:middle;" title="Tail"></th>
                                <th style="width:24%;">Error Rate</th>
                            </tr>`;
                const myRestorations = (state.past_restorations || []).filter(r => r.class_id == myClassId).sort((a,b) => a.round - b.round);
                myRestorations.forEach(r => {
                    const allForRound = (state.past_restorations || []).filter(x => x.round === r.round && x.error_rate !== null).sort((a,b) => (a.error_rate - b.error_rate) || (b.id - a.id));
                    const rankIndex = allForRound.findIndex(x => x.class_id == myClassId);
                    const rankStr = rankIndex !== -1 ? `#${rankIndex + 1}` : '-';

                    restHtml += `<tr>
                        <td style="white-space:nowrap;">Round ${r.round}</td>
                        <td style="font-weight:bold; color:var(--primary-color);">${rankStr}</td>
                        <td style="font-weight:bold; font-size:1.1em;">${r.skull_sub}</td>
                        <td style="font-weight:bold; font-size:1.1em;">${r.torso_sub}</td>
                        <td style="font-weight:bold; font-size:1.1em;">${r.leg_sub}</td>
                        <td style="font-weight:bold; font-size:1.1em;">${r.tail_sub}</td>
                        <td style="color:${r.error_rate !== null ? 'var(--primary-color)' : 'var(--text-muted)'}; font-weight:bold; white-space:nowrap;">
                            ${r.error_rate !== null ? formatErrorRate(r.error_rate, r.round) : 'Pending'}
                        </td>
                    </tr>`;
                });
                document.getElementById('tblPastRestorations').innerHTML = restHtml;
            }

            if(state.excavatorDistribution && Object.keys(state.excavatorDistribution).length > 0) {
                let tableHtml = `<table style="width:100%; text-align:left; font-size:1em;"><tr><th>Class</th><th>Assigned Sack</th></tr>`;
                const sortedClasses = Object.keys(state.excavatorDistribution).sort((a,b) => parseInt(a) - parseInt(b));
                for(const classId of sortedClasses) {
                    const sackName = state.excavatorDistribution[classId];
                    tableHtml += `<tr><td style="font-weight:bold;">Class ${classId}</td><td style="color:var(--primary-color); font-weight:bold;">${sackName}</td></tr>`;
                }
                tableHtml += `</table>`;
                document.getElementById('excavatorSacks').innerHTML = tableHtml;
            } else {
                document.getElementById('excavatorSacks').innerHTML = 'Awaiting Excavator Distribution...';
            }

            if(state.current_phase == 5) {
                document.getElementById('pnlSubmitFossil').classList.remove('hidden');
            } else {
                document.getElementById('pnlSubmitFossil').classList.add('hidden');
            }
            
            const roundRoles = {
                1: ['A: Archaeologist', 'B: Excavator', 'C: Researcher', 'D: Smuggler'],
                2: ['A: Archaeologist', 'B: Excavator', 'C: Researcher', 'D: Smuggler'],
                3: ['A: Excavator', 'B: Researcher', 'C: Smuggler', 'D: Archaeologist'],
                4: ['A: Researcher', 'B: Smuggler', 'C: Archaeologist', 'D: Excavator'],
                5: ['A: Smuggler', 'B: Archaeologist', 'C: Excavator', 'D: Researcher'],
                6: ['A: Archaeologist', 'B: Excavator', 'C: Researcher', 'D: Smuggler']
            };
            const rolesForRound = roundRoles[state.current_round] || roundRoles[1];
            document.getElementById('roleTable').innerHTML = rolesForRound.map(r => `<div>${r}</div>`).join('');

            const btnSubmit = document.getElementById('btnSubmitFossil');
            if (state.current_restorations && btnSubmit) {
                const myRest = state.current_restorations.find(r => r.class_id == myClassId);
                if (myRest) {
                    if (myRest.is_locked === 1) {
                        btnSubmit.disabled = true;
                        btnSubmit.innerText = 'Locked by Admin';
                    } else {
                        btnSubmit.disabled = false;
                        btnSubmit.innerText = 'Submitted (Can Edit)';
                    }
                } else {
                    btnSubmit.disabled = false;
                    btnSubmit.innerText = 'Submit Fossil Restoration';
                }
            }
        }

        socket.on('timer:tick', (data) => {
            const min = Math.floor(data.remaining / 60);
            const sec = data.remaining % 60;
            const display = document.getElementById('timerDisplay');
            display.innerText = `${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
            if (data.remaining === 0 && !data.running) {
                display.classList.add('blinking');
            } else {
                display.classList.remove('blinking');
            }
        });

        function formatErrorRate(rate, round) {
            if (rate === null || rate === undefined) return 'Pending';
            if (round === 6) {
                return Number(rate).toFixed(2) + '%';
            } else {
                return Math.round(Number(rate)) + '%';
            }
        }

        socket.on('reveal:show', (data) => {
            const overlay = document.getElementById('resultOverlay');
            const container = document.getElementById('resultCards');
            overlay.style.display = 'flex';
            setTimeout(() => { overlay.style.opacity = '1'; }, 10);
            container.innerHTML = '';
            
            const sorted = data.results.sort((a,b) => b.error_rate - a.error_rate);
            const delay = 1000;
            
            sorted.forEach((r, i) => {
                const rank = sorted.length - i;
                const isWinner = rank === 1;
                const card = document.createElement('div');
                card.className = 'result-card' + (isWinner && data.isFinal ? ' winner' : '');
                card.innerHTML = `<span style="text-align:left;">#${rank} Class ${r.class_id}</span><span style="text-align:left; padding-left:20px;">Error: ${formatErrorRate(r.error_rate, data.round)}</span>`;
                container.prepend(card);
                
                setTimeout(() => card.classList.add('visible'), (i + 1) * delay);
            });
        });

        socket.on('reveal:hide', () => {
            const overlay = document.getElementById('resultOverlay');
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.display = 'none';
            }, 800);
        });

        // ── Ready System (C-06) ──
        window.currentReadyStatus = {};
        function updateReadyUI() {
            const btn = document.getElementById('btnReadyToggle');
            if(!btn) return;
            if(myClassId && window.currentReadyStatus[myClassId] !== undefined) {
                const isReady = window.currentReadyStatus[myClassId];
                if(isReady) {
                    btn.classList.add('ready-ok');
                    btn.innerText = 'Ready OK';
                } else {
                    btn.classList.remove('ready-ok');
                    btn.innerText = 'Ready';
                }
            } else {
                btn.classList.remove('ready-ok');
                btn.innerText = 'Ready';
            }
        }
        function toggleReady() {
            if(!myClassId) { alert("Please set class_id in URL."); return; }
            const isReady = !(window.currentReadyStatus[myClassId] || false);
            socket.emit('client:setReady', { class_id: myClassId, isReady: isReady });
        }
        socket.on('ready:update', (status) => {
            window.currentReadyStatus = status;
            updateReadyUI();
        });


        function submitFossil() {
            console.log("submitFossil called!");
            const h = parseInt(document.getElementById('subH').value) || 0;
            const b = parseInt(document.getElementById('subB').value) || 0;
            const l = parseInt(document.getElementById('subL').value) || 0;
            const t = parseInt(document.getElementById('subT').value) || 0;

            const maxH = parseInt(document.getElementById('invH').innerText);
            const maxB = parseInt(document.getElementById('invB').innerText);
            const maxL = parseInt(document.getElementById('invL').innerText);
            const maxT = parseInt(document.getElementById('invT').innerText);

            if(h > maxH || b > maxB || l > maxL || t > maxT) {
                alert("Error: Submitted bones cannot exceed your current inventory!");
                return;
            }

            if(confirm("Are you sure you want to submit this combination?")) {
                socket.emit('clientA:submitRestoration', {
                    class_id: myClassId,
                    round: currentRound,
                    H: h, B: b, L: l, T: t
                });
                alert("Submitted successfully! Waiting for Admin approval.");
            }
        }

        function toggleStatusBoards() {
            const overlay = document.getElementById('statusBoardsOverlay');
            if (overlay.style.display === 'none' || overlay.style.display === '') {
                overlay.style.display = 'flex';
                setTimeout(() => { overlay.style.opacity = '1'; }, 10);
            } else {
                overlay.style.opacity = '0';
                setTimeout(() => { overlay.style.display = 'none'; }, 300);
            }
        }

        function toggleTicket(element, cardId) {
            let used = JSON.parse(localStorage.getItem('usedTickets') || '{}');
            if (used[cardId]) {
                delete used[cardId];
                element.style.textDecoration = 'none';
                element.style.opacity = '1';
            } else {
                used[cardId] = true;
                element.style.textDecoration = 'line-through';
                element.style.opacity = '0.5';
            }
            localStorage.setItem('usedTickets', JSON.stringify(used));
        }
    </script>
</body>
</html>

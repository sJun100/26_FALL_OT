<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Excavator - Client B</title>
    <link rel="stylesheet" href="css/theme.css">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        .draft-row { margin-bottom: 20px; padding: 10px; border: 1px solid var(--primary-color); border-radius: 4px; }
        .sack-btn { margin: 5px; }
        .sack-btn.selected { background: var(--primary-color); color: #000; }
        .sack-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .sack-info { font-size: 0.85em; color: var(--text-muted); margin-top: 5px; }
    </style>
</head>
<body>
    <div class="overlay">
        <div class="panel" style="display:flex; justify-content:space-between; align-items:center; padding: 10px 20px;">
            <div style="flex: 1; text-align: left;"><h1 style="margin-bottom:0;">Excavator Draft</h1></div>
            <div style="flex: 1; text-align: center;"><div class="timer" id="timerDisplay" style="font-size:2.5em; display:inline-block;">00:00</div></div>
            <div style="flex: 1; font-size: 1.5em; display: flex; align-items: center; justify-content: flex-end; gap: 15px;">
                <button id="btnReadyToggle" class="btn-ready" onclick="toggleReady()">Ready</button>
                <div style="text-align: right;">
                    <div>Round: <span id="lblRound" style="color:var(--primary-color);">?</span></div>
                    <div>Phase: <span id="lblPhase" style="color:var(--primary-color);">?</span></div>
                </div>
            </div>
        </div>
        
        <div class="panel flex-col h-full" style="padding: 10px 20px; flex: 1;">



            <div class="grid grid-cols-2 flex-1" style="gap: 15px;">
                <div class="panel flex-col" style="padding: 10px; margin: 0;">
                    <h3 style="margin-top:0;">Draft Assignments</h3>
                    <div id="draftArea" class="flex-1" style="display:flex; flex-direction:column; gap:5px; overflow-y:auto;"></div>
                </div>

                <div class="panel flex-col" style="padding: 10px; margin: 0;">
                    <h3 style="margin-top:0;">Sack Contents</h3>
                    <div class="scrollable-panel flex-1">
                        <table id="tblSackInfo" style="font-size:0.95em;">
                            <tr><th>Sack</th><th><img src="resources/skull.png" style="height:1.2em; vertical-align:middle;"> Skull</th><th><img src="resources/torso.png" style="height:1.2em; vertical-align:middle;"> Torso</th><th><img src="resources/leg.png" style="height:1.2em; vertical-align:middle;"> Leg</th><th><img src="resources/tail.png" style="height:1.2em; vertical-align:middle;"> Tail</th><th>Total</th></tr>
                        </table>
                    </div>
                    <div style="margin-top: 15px; display: flex; gap: 10px;">
                        <button onclick="resetDraft()" style="background: #440000; color: white; flex: 1;">Reset All</button>
                        <button id="btnSubmit" onclick="submitDraft()" disabled style="flex: 2;">Finalize Distribution</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="connectionDot" class="connection-indicator"></div>

    <script src="js/socket-client.js"></script>
    <script>
        const classes = [27, 28, 29, 30, 31];
        const phaseNames = {1:'Plan', 2:'Mission', 3:'Return', 4:'Restoration', 5:'Submission'};
        let sackNames = [];
        let sackData = {};
        let currentRound = '1';
        let selections = {};

        // Timer Logic
        socket.on('timer:tick', (data) => {
            const min = Math.floor(data.remaining / 60);
            const sec = data.remaining % 60;
            const display = document.getElementById('timerDisplay');
            display.innerText = `${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
            if (data.remaining === 0 && !data.running) display.classList.add('blinking');
            else display.classList.remove('blinking');
        });

        function onStateUpdate(state) {
            currentRound = state.current_round || '1';
            document.getElementById('lblRound').innerText = currentRound;
            document.getElementById('lblPhase').innerText = `${state.current_phase} (${phaseNames[state.current_phase] || ''})`;

            if (state.sacks && Object.keys(state.sacks).length > 0) {
                sackData = state.sacks;
                sackNames = Object.keys(sackData);

                let infoHtml = '<tr><th>Sack</th><th><img src="resources/skull.png" style="height:1.2em; vertical-align:middle;"> Skull</th><th><img src="resources/torso.png" style="height:1.2em; vertical-align:middle;"> Torso</th><th><img src="resources/leg.png" style="height:1.2em; vertical-align:middle;"> Leg</th><th><img src="resources/tail.png" style="height:1.2em; vertical-align:middle;"> Tail</th><th>Total</th></tr>';
                sackNames.forEach(name => {
                    const s = sackData[name];
                    const total = s.skull + s.torso + s.leg + s.tail;
                    infoHtml += `<tr><td>${name}</td><td>${s.skull}</td><td>${s.torso}</td><td>${s.leg}</td><td>${s.tail}</td><td>${total}</td></tr>`;
                });
                document.getElementById('tblSackInfo').innerHTML = infoHtml;

                if (document.getElementById('draftArea').innerHTML === '' ||
                    document.getElementById('draftArea').innerHTML.includes('Waiting')) {
                    renderDraftArea();
                }
            }
        }

        function renderDraftArea() {
            if (sackNames.length === 0) {
                document.getElementById('draftArea').innerHTML = '<p style="color:var(--accent-red);">Waiting for sack data from server...</p>';
                return;
            }
            let html = '';
            for (let rank = 1; rank <= 5; rank++) {
                html += `<div class="draft-row" style="margin-bottom: 0; padding: 10px; display: flex; align-items: center; justify-content: space-between;">
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <span style="font-weight:bold; font-size:1em; width:60px;">Rank ${rank}</span>
                        <select id="selClass_${rank}" onchange="checkCompletion()" style="width: 80px; padding: 4px;">
                            <option value="">-</option>
                            ${classes.map(c => `<option value="${c}">${c}</option>`).join('')}
                        </select>
                    </div>
                    <div style="display:flex; flex-wrap:wrap; gap:5px; justify-content:flex-end;">
                        ${sackNames.map(s => {
                            const safeId = s.replace(/[^a-zA-Z0-9]/g, '_');
                            return `<button class="sack-btn" id="btnSack_${rank}_${safeId}" data-sack="${s}" onclick="pickSack(${rank}, '${s}')" style="margin:0; padding: 5px 8px; font-size:0.9em;">${s}</button>`;
                        }).join('')}
                    </div>
                </div>`;
            }
            document.getElementById('draftArea').innerHTML = html;
        }

        function pickSack(rank, sackName) {
            const safeId = sackName.replace(/[^a-zA-Z0-9]/g, '_');
            sackNames.forEach(s => {
                const sid = s.replace(/[^a-zA-Z0-9]/g, '_');
                const btn = document.getElementById(`btnSack_${rank}_${sid}`);
                if (btn) btn.classList.remove('selected');
            });
            const btn = document.getElementById(`btnSack_${rank}_${safeId}`);
            if (btn) btn.classList.add('selected');
            updateSackAvailability();
            checkCompletion();
        }

        function updateSackAvailability() {
            let selectedSacks = [];
            for (let i = 1; i <= 5; i++) {
                sackNames.forEach(s => {
                    const sid = s.replace(/[^a-zA-Z0-9]/g, '_');
                    const btn = document.getElementById(`btnSack_${i}_${sid}`);
                    if (btn && btn.classList.contains('selected')) selectedSacks.push(s);
                });
            }
            for (let i = 1; i <= 5; i++) {
                sackNames.forEach(s => {
                    const sid = s.replace(/[^a-zA-Z0-9]/g, '_');
                    const btn = document.getElementById(`btnSack_${i}_${sid}`);
                    if (!btn) return;
                    btn.disabled = !btn.classList.contains('selected') && selectedSacks.includes(s);
                });
            }
        }

        function updateClassAvailability() {
            let selected = [];
            for(let i=1; i<=5; i++) {
                const el = document.getElementById(`selClass_${i}`);
                if (el && el.value) selected.push({rank: i, val: el.value});
            }
            for(let i=1; i<=5; i++) {
                const el = document.getElementById(`selClass_${i}`);
                if (!el) continue;
                const selectedElsewhere = selected.filter(s => s.rank !== i).map(s => s.val);
                Array.from(el.options).forEach(opt => {
                    if (opt.value === "") return;
                    opt.disabled = selectedElsewhere.includes(opt.value);
                });
            }
        }

        function checkCompletion() {
            updateClassAvailability();
            let complete = true;
            selections = {};
            let selectedClasses = [];
            for (let i = 1; i <= 5; i++) {
                const clsEl = document.getElementById(`selClass_${i}`);
                if (!clsEl) { complete = false; continue; }
                const cls = clsEl.value;
                let selectedSack = null;
                sackNames.forEach(s => {
                    const sid = s.replace(/[^a-zA-Z0-9]/g, '_');
                    const btn = document.getElementById(`btnSack_${i}_${sid}`);
                    if (btn && btn.classList.contains('selected')) selectedSack = s;
                });
                if (!cls || !selectedSack) { complete = false; }
                else {
                    if (selectedClasses.includes(cls)) complete = false;
                    selectedClasses.push(cls);
                    selections[cls] = selectedSack;
                }
            }
            document.getElementById('btnSubmit').disabled = !complete;
        }

        function resetDraft() { renderDraftArea(); document.getElementById('btnSubmit').disabled = true; }

        function submitDraft() {
            let summary = 'Distribution Summary:\n';
            for (const [cls, sack] of Object.entries(selections)) {
                const bones = sackData[sack];
                if (bones) summary += `Class ${cls} -> ${sack} (S:${bones.skull} T:${bones.torso} L:${bones.leg} Ta:${bones.tail})\n`;
            }
            if (confirm(summary + '\nFinalize?')) {
                socket.emit('clientB:submitDraft', { draftResults: selections, round: currentRound });
                alert('Distribution finalized!');
                resetDraft();
            }
        }

        renderDraftArea();

        // ── Ready System (C-06) ──
        const myRoleId = 'Excavator';
        window.currentReadyStatus = {};
        function updateReadyUI() {
            const btn = document.getElementById('btnReadyToggle');
            if(!btn) return;
            if(window.currentReadyStatus[myRoleId] !== undefined) {
                const isReady = window.currentReadyStatus[myRoleId];
                if(isReady) {
                    btn.classList.add('ready-ok');
                    btn.innerText = 'Ready OK';
                } else {
                    btn.classList.remove('ready-ok');
                    btn.innerText = 'Ready';
                }
            } else {
                btn.classList.remove('ready-ok');
                btn.innerText = 'Ready';
            }
        }
        function toggleReady() {
            const isReady = !(window.currentReadyStatus[myRoleId] || false);
            socket.emit('client:setReady', { class_id: myRoleId, isReady: isReady });
        }
        socket.on('connect', () => {
            socket.emit('getReadyStatus');
        });
        socket.on('ready:update', (status) => {
            window.currentReadyStatus = status;
            updateReadyUI();
        });
    </script>
</body>
</html>
